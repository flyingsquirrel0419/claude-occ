name: Bug report
description: Report a reproducible problem with occ or the local gateway.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not paste API keys, OAuth tokens, full config files, or provider secrets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: occ start fails with...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include the smallest command sequence that reproduces the issue.
      placeholder: |
        1. Run `occ init`
        2. Select ...
        3. Run `occ start`
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste relevant logs with secrets redacted.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: occ version
      description: Output of `occ --version`.
      placeholder: occ 1.0.0
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - npm
        - cargo
        - built from source
        - other
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15, Ubuntu 24.04, Windows 11 WSL2
    validations:
      required: true
  - type: textarea
    id: provider
    attributes:
      label: Provider details
      description: Provider type and model name only. Do not include credentials.
      placeholder: OpenAI-compatible provider, model `example/model`
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I have removed API keys, OAuth tokens, and other secrets from this report.
          required: true
