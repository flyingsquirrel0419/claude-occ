<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">openclaude request flow</title>
  <desc id="desc">Claude Code sends Anthropic Messages API traffic to a local occ gateway, which routes to configured providers.</desc>
  <rect width="1200" height="430" rx="28" fill="#f8fafc"/>
  <rect x="32" y="32" width="1136" height="366" rx="24" fill="#ffffff" stroke="#d7dee8" stroke-width="2"/>

  <text x="600" y="78" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="700" fill="#172033">openclaude</text>
  <text x="600" y="111" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" fill="#536174">Claude Code provider gateway over the Anthropic Messages API</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="76" y="165" width="235" height="125" rx="18" fill="#111827"/>
    <rect x="93" y="184" width="201" height="25" rx="7" fill="#1f2937"/>
    <circle cx="111" cy="196" r="5" fill="#ef4444"/>
    <circle cx="128" cy="196" r="5" fill="#f59e0b"/>
    <circle cx="145" cy="196" r="5" fill="#22c55e"/>
    <text x="98" y="238" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#e5e7eb">$ claude</text>
    <text x="98" y="268" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15" fill="#9ca3af">/model provider/model</text>
  </g>

  <line x1="335" y1="228" x2="470" y2="228" stroke="#0f766e" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="402" y="207" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#0f766e">/v1/messages</text>

  <g filter="url(#shadow)">
    <rect x="492" y="151" width="216" height="153" rx="22" fill="#ecfeff" stroke="#67e8f9" stroke-width="2"/>
    <text x="600" y="205" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="800" fill="#0f172a">occ</text>
    <text x="600" y="235" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#155e75">local gateway</text>
    <text x="600" y="264" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#334155">127.0.0.1:10110</text>
  </g>

  <line x1="730" y1="228" x2="862" y2="228" stroke="#0f766e" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="795" y="207" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#0f766e">route</text>

  <g filter="url(#shadow)">
    <rect x="890" y="129" width="230" height="52" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1005" y="162" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#172033">Anthropic API</text>
    <rect x="890" y="194" width="230" height="52" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1005" y="227" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#172033">OpenRouter / Umans</text>
    <rect x="890" y="259" width="230" height="52" rx="14" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2"/>
    <text x="1005" y="292" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#172033">Local OpenAI API</text>
  </g>

  <text x="600" y="358" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15" fill="#64748b">Shim autostart: claude -> occ ensure -> gateway env -> real Claude Code</text>
</svg>
